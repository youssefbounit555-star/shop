{% extends "admin/base.html" %}

{% block title %}Delete Product - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h5>
            </div>
            <div class="card-body">
                <p class="mb-3">Are you sure you want to delete this product?</p>
                <div class="alert alert-warning">
                    <strong>{{ object.name }}</strong> will be permanently deleted.
                </div>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Yes, Delete
                    </button>
                    <a href="{% url 'admin_panel:products_list' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
