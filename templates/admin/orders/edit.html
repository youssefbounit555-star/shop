{% extends "admin/base.html" %}

{% block title %}Edit Order - Admin{% endblock %}

{% block content %}
<div class="top-bar">
    <h1><i class="fas fa-edit"></i> Edit Order</h1>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Order Information</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Order Status</label>
                <select name="status" class="form-select">
                    {% for value, label in status_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Internal Notes</label>
                <textarea name="notes" class="form-control" rows="4" placeholder="Add notes about this order..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Changes
            </button>
            <a href="{% url 'admin_panel:orders_detail' object.order_id %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
