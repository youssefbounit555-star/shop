{% extends "base.html" %}

{% block title %}Server Error - 500{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">Something went wrong on our end. We're working to fix it!</p>
        
        <div class="error-illustration">
            <i class="fas fa-exclamation-triangle" style="font-size: 100px; color: #ccc; margin: 20px 0;"></i>
        </div>
        
        <div class="error-actions">
            <a href="{% url 'store:home' %}" class="btn btn-primary">
                <i class="fas fa-home"></i> Go to Home
            </a>
            <a href="{% url 'store:store' %}" class="btn btn-secondary">
                <i class="fas fa-shopping-bag"></i> Browse Products
            </a>
        </div>
        
        <div class="error-footer">
            <p>If the problem persists, please <a href="{% url 'store:contact' %}">contact us</a></p>
        </div>
    </div>
</div>

<style>
    .error-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }
    
    .error-content {
        text-align: center;
        max-width: 500px;
    }
    
    .error-code {
        font-size: 120px;
        font-weight: bold;
        color: #e74c3c;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    
    .error-title {
        font-size: 32px;
        color: #333;
        margin-bottom: 10px;
    }
    
    .error-message {
        font-size: 18px;
        color: #666;
        margin-bottom: 30px;
    }
    
    .error-illustration {
        margin: 30px 0;
    }
    
    .error-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 30px 0;
    }
    
    .error-footer {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        color: #999;
    }
    
    .error-footer a {
        color: #3498db;
        text-decoration: none;
    }
    
    .error-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
