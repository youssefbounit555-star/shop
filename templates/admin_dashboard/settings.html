{% extends 'base.html' %}
{% block content %}
<script>
  document.documentElement.classList.add('is-loading');
  window.addEventListener('load', () => {
    document.documentElement.classList.remove('is-loading');
  });
</script>
<div class="container py-5">
  <div class="skeleton-page">
    <div class="skeleton-placeholder">
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton-card mb-4 skeleton-grid">
        <div>
          <div class="skeleton skeleton-field"></div>
          <div class="skeleton skeleton-input"></div>
        </div>
        <div>
          <div class="skeleton skeleton-field"></div>
          <div class="skeleton skeleton-input"></div>
        </div>
        <div>
          <div class="skeleton skeleton-field"></div>
          <div class="skeleton skeleton-input"></div>
        </div>
        <div>
          <div class="skeleton skeleton-field"></div>
          <div class="skeleton skeleton-input"></div>
        </div>
        <div class="skeleton skeleton-button"></div>
      </div>
    </div>

    <div class="skeleton-real">
      <h1 class="fw-bold mb-4" style="color:#425ed8;">Website Settings</h1>
      <div class="card p-4 shadow-sm border-0 mb-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-gradient-primary">Save Settings</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
